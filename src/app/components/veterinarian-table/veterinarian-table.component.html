<h2 class="text-center">Veterinarians</h2>

<div class="d-flex justify-content-center">
  <button class="btn btn-primary btn-lg mb-3" (click)="goToCreatePage()">Create new veterinarian</button>   
</div>

<div class="card">
  <div class="card-header">
    <h5>Veterinarian Information</h5>
  </div>
  <div class="card-body">
    <table class="table table-hover">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let veterinarian of veterinarians">
            <td>{{ veterinarian.id }}</td>
            <td>{{ veterinarian.name }}</td>
            <td>{{ veterinarian.email }}</td>
            <td>
                <button class="btn btn-sm btn-primary me-2" (click)="updateVeterinarian(veterinarian.id)">Edit</button>
                <button class="btn btn-sm btn-danger" (click)="deleteVeterinarian(veterinarian.id)">Delete</button>
            </td>
        </tr>
</table>
</div>
</div>
