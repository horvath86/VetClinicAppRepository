<h2 class="text-center my-5">{{ isEditing ? 'Edit' : 'Create' }} appointment</h2>

<div *ngIf="errorMessage!=''">
    {{ errorMessage }}
</div>

<form class="border rounded p-3 w-50 mb-5 mx-auto" (ngSubmit)="onSubmit()">

    <div class="mb-3">
        <label class="form-label" for="vetId">Veterinarian:</label>
        <select class="form-select" name="vetId" id="vetId" [(ngModel)]="appointmentDTO.vetId">
            <option value="0" disabled selected>-- Select a veterinarian --</option>
            <option *ngFor="let vet of veterinarians" [value]="vet.id">
                {{vet.name}}
            </option>
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label" for="dateTime">Date and time:</label>
        <input type="datetime-local" class="form-control" name="dateTime" [(ngModel)]="appointmentDTO.dateTime">
    </div>

    <div class="mb-3">
        <label class="form-label" for="Status">Status:</label>
        <select class="form-select" name="Status" [(ngModel)]="appointmentDTO.status">
            <option *ngFor="let st of Status; let i=index" [ngValue]="i">{{st}}</option>
        </select>
    </div>

     <div>
        <button class="btn btn-primary" type="submit">{{isEditing ? 'Edit' : 'Create'}} medical record</button>
    </div>

</form>
