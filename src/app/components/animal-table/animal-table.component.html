<h2 class="text-center">Animals</h2>
<div class="d-flex justify-content-center">
  <button class="btn btn-primary btn-lg mb-3" (click)="goToCreatePage()">Create new animal</button>
</div>

<div class="card">
  <div class="card-header">
    <h5>Animal Information</h5>
  </div>
  <div class="card-body">
    <table class="table table-hover">
  <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Species</th>
      <th>Date of birth</th>
      <th>Gender</th>
      <th>Owner name</th>
      <th>Phone</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let animal of animals">
      <td>{{ animal.id }}</td>
      <td>{{ animal.name }}</td>
      <td>{{ Species[animal.species] }}</td>
      <td>{{ animal.dateOfBirth | date }}</td>
      <td>{{ Gender[animal.gender] }}</td>
      <td>{{ animal.ownerName }}</td>
      <td>{{ animal.phone }}</td>
      <td>
        <button class="btn btn-sm btn-primary me-2" (click)="updateAnimal(animal.id)">Edit</button>
        <button class="btn btn-sm btn-danger" (click)="deleteAnimal(animal.id)">Delete</button>
      </td>
    </tr>
  </tbody>
    </table>
  </div>
</div>
