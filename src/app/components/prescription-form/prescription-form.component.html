<h2>{{ this.isEditing ? 'Edit' : 'Create' }} Prescription</h2>

<div *ngIf="errorMessage!=''">
    {{ errorMessage }}
</div>

<form (ngSubmit)="onSubmit()">

    <div>
        <label for="medicalRecordID">Medical Record ID:</label>
        <input type="number" name="medicalRecordID" id="medicalRecordID" [(ngModel)]="prescriptionDTO.medicalRecordId" readonly />
    </div>
    
    <div>
        <label for="medName">Medication Name:</label>
        <select name="medName" [(ngModel)]="prescriptionDTO.medName">
            <option *ngFor="let med of MedName; let i = index" [ngValue]="i">{{ med }}</option>
        </select>
    </div>

    <div>
        <label for="dosage">Dosage:</label>
        <input type="number" name="dosage" [(ngModel)]="prescriptionDTO.dosage">
    </div>

    <div>
        <label for="frequencyInHrs">Frequency (hours):</label>
        <input type="number" name="frequencyInHrs" [(ngModel)]="prescriptionDTO.frequencyInHrs">
    </div>

    <div>
        <label for="durationInDays">Duration (days):</label>
        <input type="number" name="durationInDays" [(ngModel)]="prescriptionDTO.durationInDays">
    </div>
    
    <div>
        <button type="submit">{{ isEditing ? 'Edit' : 'Create' }} prescription</button>
    </div>
</form>
