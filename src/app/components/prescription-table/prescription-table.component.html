<h2 class="text-center">Prescriptions</h2>

<div class="card">
  <div class="card-header">
    <h5>Prescription Information</h5>
  </div>
  <div class="card-body">
    <table class="table table-hover">
    <thead>
        <tr>
            <th>ID</th>
            <th>Medical record ID</th>
            <th>Medication Name</th>
            <th>Dosage</th>
            <th>Frequency</th>
            <th>Duration</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let prescription of prescriptions">
            <td>{{ prescription.id }}</td>
            <td>{{ prescription.medicalRecordId }}</td>
            <td>{{ medName[prescription.medName] }}</td>
            <td>{{ prescription.dosage }}</td>
            <td>{{ prescription.frequencyInHrs }}</td>
            <td>{{ prescription.durationInDays }}</td>
            <td>
                <button class="btn btn-sm btn-primary me-2" (click)="updatePrescription(prescription.id)">Edit</button>
                <button class="btn btn-sm btn-danger" (click)="deletePrescription(prescription.id)">Delete</button>
            </td>
        </tr>
    </tbody>
</table>
  </div>
</div>
